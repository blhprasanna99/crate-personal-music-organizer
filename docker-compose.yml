name: crate
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: crate
      POSTGRES_PASSWORD: crate
      POSTGRES_DB: crate
    ports:
      - "5432:5432"
    volumes:
      - crate-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crate -d crate"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  crate-pgdata: